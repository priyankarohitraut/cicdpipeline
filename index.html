<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Enfield Showroom</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px gray;
}

h1{
    text-align:center;
    color:#b30000;
}

h2{
    text-align:center;
}

input, textarea, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#800000;
}

#welcomePage{
    display:none;
}

</style>

<script>

function login(){
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    if(username !== "" && password !== ""){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("welcomePage").style.display="block";
    }
    else{
        alert("Please enter username and password");
    }
}

function submitFeedback(){
    alert("Thank you for your feedback!");
}

</script>

</head>

<body>

<div class="container" id="loginPage">

<h1>Royal Enfield Showroom</h1>
<h2>Login Page</h2>

<label>Username</label>
<input type="text" id="username" placeholder="Enter Username">

<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>


<div class="container" id="welcomePage">

<h1>Welcome to Royal Enfield Showroom</h1>

<h2>Customer Feedback Form</h2>

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Which Bike Do You Like?</label>
<select>
<option>Classic 350</option>
<option>Bullet 350</option>
<option>Hunter 350</option>
<option>Meteor 350</option>
<option>Himalayan</option>
</select>

<label>Your Feedback</label>
<textarea rows="4" placeholder="Write your feedback"></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

</div>

</body>
</html>
