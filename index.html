<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royal Enfield Showroom</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
}

.container{
width:400px;
margin:60px auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0px 0px 10px gray;
}

h1{
text-align:center;
color:#b30000;
}

input, textarea, select{
width:100%;
padding:8px;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#b30000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#800000;
}

#welcome{
display:none;
}

</style>

<script>

function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user!="" && pass!="")
{
document.getElementById("login").style.display="none";
document.getElementById("welcome").style.display="block";
}
else
{
alert("Enter username and password");
}

}

function feedback(){
alert("Thank you for your feedback!");
}

</script>

</head>

<body>

<div class="container" id="login">

<h1>Royal Enfield Showroom</h1>

<h3>Login</h3>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>


<div class="container" id="welcome">

<h1>Welcome to Royal Enfield Showroom</h1>

<a href="showroom.html">
<button>Visit Showroom</button>
</a>

<h3>Customer Feedback</h3>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Email">

<select>
<option>Classic 350</option>
<option>Bullet 350</option>
<option>Meteor 350</option>
<option>Hunter 350</option>
<option>Himalayan</option>
</select>

<textarea rows="4" placeholder="Write feedback"></textarea>

<button onclick="feedback()">Submit Feedback</button>

</div>

</body>
</html>
